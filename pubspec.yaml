name: ecomeee
description: "A Flutter E-Commerce application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Networking
  dio: ^5.7.0
  retrofit: 4.4.2
  pretty_dio_logger: ^1.4.0

  # DI
  get_it: ^8.0.3

  # Code Generation
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # Navigation
  go_router: ^14.8.1

  # UI
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  retrofit_generator: 9.1.7
  json_serializable: ^6.9.4
  freezed: ^2.5.7

flutter:
  uses-material-design: true
